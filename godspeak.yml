LOW: &LOW
  - 'As the shopkeeper hands you the pack, you overhear two travelers discussing an attack on nearby Arabel. One swears a black dragon was seen circling overhead before the attack began.'
  - 'Pinned to the notice board is a request for adventurers. Three merchant caravans have vanished along the East Way, leaving behind only scorched wagons and scattered coin.'
  - 'While opening your pack, you notice someone carving a five-clawed symbol into a tavern table. When confronted, they quickly leave without saying a word.'
  - 'The skies outside darken unexpectedly. Several patrons glance nervously toward the clouds before returning to their conversations.'
  - 'An old ranger mutters into his ale, "I ''ve seen those purple robes before. Last time they showed up, dragons weren''t far behind."'
  - 'Several exhausted travelers enter the shop seeking supplies. They speak quietly of villages abandoning their homes farther east.'
  - 'The town crier announces that a local sage specializing in draconic history has disappeared under mysterious circumstances.'
  - 'Fresh notices have appeared on the board requesting aid for farmers whose fields were destroyed during the night by an unknown creature.'
  - 'The bard performing nearby suddenly changes songs. The new ballad speaks of five ancient tyrants awakening beneath a blood-red sky.'
  - '"Business has been terrible lately," the shopkeeper says while handing you your pack. "Too many people are worried about dragons to spend coin on cards."'
  - 'You overhear several patrons discussing vivid dreams of enormous reptilian eyes watching them from the darkness.'
  - 'Displayed beside the register is an unusually large black scale. The shopkeeper refuses to say where it came from.'
  - 'A sealed notice bearing the insignia of the Harpers warns citizens to report unusual cult activity immediately.'
  - 'As you leave with your pack, you hear a cloaked figure whisper, "The Queen''s chains weaken with every passing day."'
  - 'Posted on the notice board is a sizable bounty for information regarding dragon sightings. Someone has scribbled underneath: "Too late."'
  - 'A courier rushes into the shop carrying a sealed message marked URGENT. Upon seeing the sender''s crest, the shopkeeper immediately locks it away.'
  - 'Two adventurers argue over a map. One insists several towns shown on it no longer exist.'
  - 'A local blacksmith has stopped taking commissions. He claims every spare piece of steel is needed for "what''s coming."'
  - 'A nervous merchant offers triple the usual price for any information regarding dragon cult activity.'
  - 'The tavern''s resident wizard has spent the entire day staring into a crystal ball. He looks increasingly concerned.'
  - 'A flock of birds suddenly takes flight outside. Moments later, the entire street falls eerily silent.'
  - 'Someone has posted a reward for the recovery of a stolen draconic artifact. The description has been torn away.'
  - 'A weathered adventurer swears he saw a shadow pass across the moon despite the sky being cloudless.'
  - 'A traveling priest quietly advises several patrons to avoid isolated roads after sunset.'
  - 'A caravan guard reports finding claw marks on stone walls nearly twenty feet above the ground.'
  - 'A Harper agent enters the shop, scans the room, and leaves without saying a word.'
  - 'A local historian claims several ancient prophecies concerning dragons have vanished from the archives.'
  - 'The town bell rings unexpectedly in the middle of the day. No one seems willing to explain why.'
  - 'A group of children run through the streets pretending to be dragons. Their game ends abruptly when a nearby adult tells them to stop.'
  - 'Someone has scratched a single word into the wooden notice board: "Awakening."'
  - 'A hooded traveler places a black dragon scale on the counter and quietly says, "She''s coming." Moments later, they''re gone.'
  - 'A Harper courier arrives looking exhausted. After reading his report, the shopkeeper immediately announces he''ll be closing early today.'
  - 'An elderly dragonborn enters the shop, looks around nervously, and says, "The signs are exactly as the stories foretold."'
  - 'A strange tremor rattles every mug in the room. Several patrons instinctively look toward the eastern horizon.'
  - 'A raven lands outside carrying a message tube. Whatever was written inside causes the recipient to turn pale.'
